name: datasage-benchmarks
type: job
gpu: h100
image: nvidia/cuda:12.1.0-devel-ubuntu22.04
env:
  - name: HF_TOKEN
    secret: hf-token
  - name: WANDB_API_KEY
    secret: wandb-api-key
  - name: PATRONUS_API_KEY
    secret: patronus-api-key
  - name: STAGE
    value: benchmarks
command: |
  pip install -q unsloth trl transformers accelerate peft bitsandbytes vllm wandb
  pip install -q "openenv-core[core]>=0.2.1" pandas numpy datasets
  pip install -q patronus
  python -m benchmarks.run_all
resources:
  gpu: 1
  memory: 80Gi
  cpu: 8
